const RATING_OPTIONS = [
  { value: 5, label: "🌟 Legendary", color: "#e8a020" },
  { value: 4, label: "😍 Loved It", color: "#4caf7d" },
  { value: 3, label: "😊 Good", color: "#4a90d9" },
  { value: 2, label: "😐 Okay", color: "#9b8ea0" },
  { value: 1, label: "😬 Not For Me", color: "#c0392b" },
];

const STORAGE_KEY = "national-dish-tracker-v1";

function getRatingStyle(rating) {
  const opt = RATING_OPTIONS.find((r) => r.value === rating);
  return opt ? opt.color : "#ccc";
}

function Stars({ rating }) {
  return (
    <span style={{ letterSpacing: 1 }}>
      {[1, 2, 3, 4, 5].map((s) => (
        <span key={s} style={{ color: s <= rating ? "#e8a020" : "#ddd", fontSize: 14 }}>★</span>
      ))}
    </span>
  );
}

function App() {
  const [entries, setEntries] = useState(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : {};
    } catch { return {}; }
  });
  const [search, setSearch] = useState("");
  const [filterStatus, setFilterStatus] = useState("all");
  const [sortBy, setSortBy] = useState("country");
  const [activeTab, setActiveTab] = useState("tracker");
  const [editingCountry, setEditingCountry] = useState(null);
  const [draftRating, setDraftRating] = useState(null);
  const [draftNotes, setDraftNotes] = useState("");

  useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }
    catch {}
  }, [entries]);

  const cooked = Object.keys(entries).length;
  const total = COUNTRIES.length;
  const progress = Math.round((cooked / total) * 100);
  const avgRating = cooked
    ? (Object.values(entries).reduce((s, e) => s + e.rating, 0) / cooked).toFixed(1)
    : null;

  const openEdit = (country) => {
    const existing = entries[country.country];
    setEditingCountry(country);
    setDraftRating(existing?.rating ?? null);
    setDraftNotes(existing?.notes ?? "");
  };

  const saveEntry = () => {
    if (!draftRating) return;
    setEntries((prev) => ({
      ...prev,
      [editingCountry.country]: { rating: draftRating, notes: draftNotes, date: new Date().toLocaleDateString() },
    }));
    setEditingCountry(null);
  };

  const removeEntry = (countryName) => {
    setEntries((prev) => {
      const next = { ...prev };
      delete next[countryName];
      return next;
    });
  };

  const filtered = COUNTRIES.filter((c) => {
    const q = search.toLowerCase();
    const matchSearch = c.country.toLowerCase().includes(q) || c.dish.toLowerCase().includes(q);
    const hasCooking = entries[c.country];
    if (filterStatus === "cooked") return matchSearch && hasCooking;
    if (filterStatus === "uncooked") return matchSearch && !hasCooking;
    return matchSearch;
  }).sort((a, b) => {
    if (sortBy === "rating") {
      const ra = entries[a.country]?.rating ?? 0;
      const rb = entries[b.country]?.rating ?? 0;
      return rb - ra;
    }
    return a.country.localeCompare(b.country);
  });

  const leaderboard = [...COUNTRIES]
    .filter((c) => entries[c.country])
    .sort((a, b) => (entries[b.country]?.rating ?? 0) - (entries[a.country]?.rating ?? 0))
    .slice(0, 20);

  const ratingBreakdown = RATING_OPTIONS.map((opt) => ({
    ...opt,
    count: Object.values(entries).filter((e) => e.rating === opt.value).length,
  }));

  return (
    <div style={{ fontFamily: "'Segoe UI', system-ui, sans-serif", background: "#faf7f2", minHeight: "100vh", color: "#2c1f0e" }}>

          <h1 style={{ margin: "0 0 4px", fontSize: 28, fontWeight: 800, letterSpacing: -0.5 }}>🌍 World Dish Challenge</h1>
          <p style={{ margin: "0 0 20px", opacity: 0.85, fontSize: 14 }}>Cook every country's national dish & rank them</p>

          {/* Stats bar */}
          <div style={{ display: "flex", gap: 20, flexWrap: "wrap" }}>
            {[
              { label: "Cooked", value: `${cooked} / ${total}` },
              { label: "Progress", value: `${progress}%` },
              { label: "Avg Rating", value: avgRating ? `${avgRating} ★` : "—" },
              { label: "Remaining", value: total - cooked },
            ].map((s) => (

                <div style={{ fontSize: 11, opacity: 0.8, textTransform: "uppercase", letterSpacing: 1 }}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Progress bar */}
          <div style={{ marginTop: 16, background: "rgba(255,255,255,0.2)", borderRadius: 99, height: 8 }}>
            <div style={{ background: "#f9ca24", borderRadius: 99, height: 8, width: `${progress}%`, transition: "width 0.4s" }} />

                style={{ padding: "10px 12px", borderRadius: 10, border: "1px solid #ddd", fontSize: 13, background: "#fff" }}>
                <option value="country">A–Z</option>
                <option value="rating">By Rating</option>
              </select>
            </div>

            {/* Country list */}
            <div style={{ display: "grid", gap: 8 }}>
              {filtered.map((c) => {
                const entry = entries[c.country];
                return (
                  <div key={c.country}
                    style={{ background: "#fff", borderRadius: 12, padding: "14px 16px", display: "flex", alignItems: "center", gap: 12,
                      border: entry ? `2px solid ${getRatingStyle(entry.rating)}22` : "2px solid #f0ebe3",
                      boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
                    <span style={{ fontSize: 24 }}>{c.flag}</span>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 700, fontSize: 14 }}>{c.country}</div>
                      <div style={{ color: "#9a8570", fontSize: 12, marginTop: 1 }}>{c.dish}</div>
                      {entry?.notes && (
                        <div style={{ color: "#7a6a55", fontSize: 12, marginTop: 4, fontStyle: "italic", overflow: "hidden", whiteSpace: "nowrap", textOverflow: "ellipsis" }}>
                          "{entry.notes}"
                        </div>
                      )}
                    </div>
                    {entry ? (
                      <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 4 }}>
                        <Stars rating={entry.rating} />
                        <div style={{ fontSize: 11, color: "#b0a090" }}>{entry.date}</div>
                        <div style={{ display: "flex", gap: 6 }}>
                          <button onClick={() => openEdit(c)}
                            style={{ fontSize: 11, padding: "3px 8px", borderRadius: 6, border: "1px solid #ddd", background: "#f9f6f1", cursor: "pointer", color: "#6a5a45" }}>
                            Edit
                          </button>
                          <button onClick={() => removeEntry(c.country)}
                            style={{ fontSize: 11, padding: "3px 8px", borderRadius: 6, border: "1px solid #fcc", background: "#fff5f5", cursor: "pointer", color: "#c0392b" }}>
                            ✕
                          </button>
                        </div>
                      </div>
                    ) : (
                      <button onClick={() => openEdit(c)}
                        style={{ padding: "8px 14px", borderRadius: 8, border: "none", background: "#c0392b", color: "white", fontSize: 13, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>
                        + Rate
                      </button>
                    )}
                  </div>
                );
              })}
            </div>
          </>
        )}

        {activeTab === "leaderboard" && (
          <div>
            {/* Rating breakdown */}
            <div style={{ background: "#fff", borderRadius: 14, padding: 20, marginBottom: 20, border: "1px solid #eae4db" }}>
              <h3 style={{ margin: "0 0 14px", fontSize: 15, fontWeight: 700 }}>Rating Breakdown</h3>
              {ratingBreakdown.map((r) => (
                <div key={r.value} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                  <div style={{ width: 120, fontSize: 13, color: "#5a4a35" }}>{r.label}</div>
                  <div style={{ flex: 1, background: "#f0ebe3", borderRadius: 99, height: 10 }}>
                    <div style={{ background: r.color, borderRadius: 99, height: 10, width: cooked ? `${(r.count / cooked) * 100}%` : "0%", transition: "width 0.4s" }} />
                  </div>
                  <div style={{ width: 24, textAlign: "right", fontSize: 13, fontWeight: 600 }}>{r.count}</div>
                </div>
              ))}
            </div>

            {leaderboard.length === 0 ? (
              <div style={{ textAlign: "center", padding: 48, color: "#b0a090" }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>🍽️</div>
                <div style={{ fontSize: 16, fontWeight: 600 }}>No dishes rated yet</div>
                <div style={{ fontSize: 14, marginTop: 6 }}>Head to the Tracker tab and start cooking!</div>
              </div>
            ) : (
              <div style={{ display: "grid", gap: 8 }}>
                {leaderboard.map((c, i) => {
                  const entry = entries[c.country];
                  const medals = ["🥇", "🥈", "🥉"];
                  return (
                    <div key={c.country}
                      style={{ background: "#fff", borderRadius: 12, padding: "14px 16px", display: "flex", alignItems: "center", gap: 12,
                        border: `2px solid ${getRatingStyle(entry.rating)}33`, boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
                      <div style={{ fontSize: i < 3 ? 24 : 16, width: 28, textAlign: "center", fontWeight: 700, color: "#9a8570" }}>
                        {i < 3 ? medals[i] : `#${i + 1}`}
                      </div>
                      <span style={{ fontSize: 22 }}>{c.flag}</span>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: 700, fontSize: 14 }}>{c.country}</div>
                        <div style={{ color: "#9a8570", fontSize: 12 }}>{c.dish}</div>
                        {entry.notes && <div style={{ color: "#7a6a55", fontSize: 12, fontStyle: "italic", marginTop: 2 }}>"{entry.notes}"</div>}
                      </div>
                      <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end" }}>
                        <Stars rating={entry.rating} />
                        <div style={{ fontSize: 11, color: "#b0a090", marginTop: 2 }}>{entry.date}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>

      {/* Rating modal */}
      {editingCountry && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 16 }}>
          <div style={{ background: "#fff", borderRadius: 18, padding: 28, width: "100%", maxWidth: 400, boxShadow: "0 20px 60px rgba(0,0,0,0.2)" }}>
            <div style={{ textAlign: "center", marginBottom: 20 }}>
              <div style={{ fontSize: 40 }}>{editingCountry.flag}</div>
              <h2 style={{ margin: "8px 0 2px", fontSize: 20, fontWeight: 800 }}>{editingCountry.country}</h2>
              <div style={{ color: "#9a8570", fontSize: 14 }}>{editingCountry.dish}</div>
            </div>

            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8, color: "#5a4a35" }}>How was it?</div>
              <div style={{ display: "grid", gap: 8 }}>
                {RATING_OPTIONS.map((opt) => (
                  <button key={opt.value} onClick={() => setDraftRating(opt.value)}
                    style={{ padding: "12px 16px", borderRadius: 10, border: `2px solid ${draftRating === opt.value ? opt.color : "#eae4db"}`,
                      background: draftRating === opt.value ? `${opt.color}18` : "#faf7f2",
                      cursor: "pointer", textAlign: "left", fontSize: 14, fontWeight: draftRating === opt.value ? 700 : 500,
                      color: draftRating === opt.value ? opt.color : "#5a4a35", transition: "all 0.15s" }}>
                    {opt.label}
                  </button>
                ))}
              </div>
            </div>

            <div style={{ marginBottom: 20 }}>
              <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 6, color: "#5a4a35" }}>Notes (optional)</div>
              <textarea value={draftNotes} onChange={(e) => setDraftNotes(e.target.value)}
                placeholder="Any thoughts, tweaks, or memories…"
                style={{ width: "100%", padding: "10px 12px", borderRadius: 10, border: "1px solid #ddd", fontSize: 13, resize: "vertical", minHeight: 72, boxSizing: "border-box", fontFamily: "inherit" }} />
            </div>

            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => setEditingCountry(null)}
                style={{ flex: 1, padding: "12px", borderRadius: 10, border: "1px solid #ddd", background: "#f5f0ea", cursor: "pointer", fontSize: 14, fontWeight: 600, color: "#8a7560" }}>
                Cancel
              </button>
              <button onClick={saveEntry} disabled={!draftRating}
                style={{ flex: 2, padding: "12px", borderRadius: 10, border: "none", background: draftRating ? "#c0392b" : "#ddd",
                  color: "white", cursor: draftRating ? "pointer" : "not-allowed", fontSize: 14, fontWeight: 700 }}>
                Save Rating
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
